# 崖山数据库 MCP Server Docker Compose 配置
version: '3.8'

services:
  yashan-mcp:
    build: .
    container_name: yashan-mcp-server
    ports:
      - "8080:8080"  # HTTP API 端口
    environment:
      - DB_HOST=${DB_HOST:-your_host}
      - DB_PORT=${DB_PORT:-1688}
      - DB_USER=${DB_USER:-your_username}
      - DB_PASSWORD=${DB_PASSWORD:-your_password}
      - DB_NAME=${DB_NAME:-yashandb}
    restart: unless-stopped
    # 注意：Java 需要在容器内运行，JDK 镜像会比较大
    # 也可以挂载宿主机的 Java路径
